name: Laravel

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: imagick, mbstring, fileinfo, zip, redis

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Cache Composer
        uses: actions/cache@v6
        with:
          path: /tmp/composer-cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install PHP Dependencies
        env:
          COMPOSER_CACHE_DIR: /tmp/composer-cache
        run: composer install -q --no-interaction --no-progress --prefer-dist --ignore-platform-req=ext-redis

      - name: Generate key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Prepare DomPDF directories
        run: |
          mkdir -p storage/fonts
          chmod -R 777 storage/fonts

      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: /root/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run PHPUnit
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php -d memory_limit=1G vendor/bin/phpunit
